name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]

jobs:
  build_and_deploy_job:
    # Run on push or on PR (except when closing the PR)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # IMPORTANT: Must match the exact secret name in your repo settings
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_GLACIER_0A5E9C00F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # enables PR comment integration
          action: "upload"

          # --- Static site, no framework build ---
          app_location: "/"        # Root of your site (index.html, styles.css, script.js, images/)
          skip_app_build: true     # Don't run Oryx build for plain static sites
          # No API or build output folders:
          api_location: ""
          output_location: ""
          # Optional: disable Data API (swa-db-connections)
          data_api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_GLACIER_0A5E9C00F }}
          action: "close"
