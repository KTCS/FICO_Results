// ─── SPEECH RECOGNITION HOOK ───
function useSpeechRecognition() {
  const [isListening, setIsListening] = useState(false);
  const [transcript, setTranscript] = useState("");
  const [interimTranscript, setInterimTranscript] = useState("");
  const [isSupported, setIsSupported] = useState(true);
  const recognitionRef = useRef(null);

  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setIsSupported(false);
      return;
    }
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "en-US";

    recognition.onresult = (event) => {
      let final = "";
      let interim = "";
      for (let i = 0; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript + " ";
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      if (final) setTranscript(prev => prev + final);
      setInterimTranscript(interim);
    };

    recognition.onerror = (event) => {
      if (event.error !== "no-speech") {
        console.error("Speech error:", event.error);
      }
    };

    recognition.onend = () => {
      setIsListening(false);
    };

    recognitionRef.current = recognition;
  }, []);

  const startListening = useCallback(() => {
    if (recognitionRef.current && !isListening) {
      setTranscript("");
      setInterimTranscript("");
      try {
        recognitionRef.current.start();
        setIsListening(true);
      } catch (e) { console.error(e); }
    }
  }, [isListening]);

  const stopListening = useCallback(() => {
    if (recognitionRef.current && isListening) {
      recognitionRef.current.stop();
      setIsListening(false);
    }
  }, [isListening]);

  const resetTranscript = useCallback(() => {
    setTranscript("");
    setInterimTranscript("");
  }, []);

  return { isListening, transcript, interimTranscript, isSupported, startListening, stopListening, resetTranscript, setTranscript };
}

// ─── MAIN APP ───
function VoiceDiscoveryApp() {
  const [selectedTemplate, setSelectedTemplate] = useState(null);
  const [mode, setMode] = useState(null); // "guided" | "freeform"
  const [currentPhase, setCurrentPhase] = useState(0);
  const [currentQuestion, setCurrentQuestion] = useState(0);
  const [responses, setResponses] = useState({});
  const [freeformText, setFreeformText] = useState("");
  const [showSummary, setShowSummary] = useState(false);
  const [summaryLoading, setSummaryLoading] = useState(false);
  const [aiSummary, setAiSummary] = useState("");
  const [recordingSeconds, setRecordingSeconds] = useState(0);
  const timerRef = useRef(null);

  const speech = useSpeechRecognition();
  const template = selectedTemplate ? TEMPLATES[selectedTemplate] : null;

  // Recording timer
  useEffect(() => {
    if (speech.isListening) {
      setRecordingSeconds(0);
      timerRef.current = setInterval(() => setRecordingSeconds(s => s + 1), 1000);
    } else {
      clearInterval(timerRef.current);
    }
    return () => clearInterval(timerRef.current);
  }, [speech.isListening]);

  const formatTime = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;

  // Save response for current question
  const saveResponse = useCallback(() => {
    if (!template) return;
    const key = `${currentPhase}-${currentQuestion}`;
    const text = (speech.transcript + " " + speech.interimTranscript).trim();
    if (text) {
      setResponses(prev => ({ ...prev, [key]: text }));
    }
    speech.stopListening();
    speech.resetTranscript();
  }, [template, currentPhase, currentQuestion, speech]);

  // Navigation
  const totalQuestions = template ? template.phases.reduce((sum, p) => sum + p.questions.length, 0) : 0;
  const answeredCount = Object.keys(responses).length;

  const nextQuestion = useCallback(() => {
    if (!template) return;
    saveResponse();
    const phase = template.phases[currentPhase];
    if (currentQuestion < phase.questions.length - 1) {
      setCurrentQuestion(q => q + 1);
    } else if (currentPhase < template.phases.length - 1) {
      setCurrentPhase(p => p + 1);
      setCurrentQuestion(0);
    }
  }, [template, currentPhase, currentQuestion, saveResponse]);

  const prevQuestion = useCallback(() => {
    saveResponse();
    if (currentQuestion > 0) {
      setCurrentQuestion(q => q - 1);
    } else if (currentPhase > 0) {
      const prevPhaseLen = template.phases[currentPhase - 1].questions.length;
      setCurrentPhase(p => p - 1);
      setCurrentQuestion(prevPhaseLen - 1);
    }
  }, [template, currentPhase, currentQuestion, saveResponse]);

  const isLastQuestion = template && currentPhase === template.phases.length - 1 && currentQuestion === template.phases[template.phases.length - 1].questions.length - 1;

  // Generate AI summary
  const generateSummary = async () => {
    setSummaryLoading(true);
    setShowSummary(true);
    setAiSummary("");

    let allResponses = "";
    if (mode === "guided") {
      template.phases.forEach((phase, pi) => {
        allResponses += `\n\n## ${phase.name}\n`;
        phase.questions.forEach((q, qi) => {
          const resp = responses[`${pi}-${qi}`];
          allResponses += `\nQ: ${q}\nA: ${resp || "(no response)"}\n`;
        });
      });
    } else {
      allResponses = freeformText;
    }

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5-20250514",
          max_tokens: 1000,
          system: `You are a consultant summarizing voice-captured responses from a discovery session. The template used is "${template.title}" for "${template.subtitle}". Produce a structured summary organized by phase/section. For each phase, provide 2-3 key findings in clear, professional language. At the end, add a "Key Takeaways & Action Items" section. If the input is free-form, map the content to the relevant phases as best you can. Be concise and actionable. Use markdown formatting.`,
          messages: [{ role: "user", content: `Here are the discovery responses to summarize:\n${allResponses}` }]
        })
      });
      const data = await response.json();
      const text = data.content?.map(c => c.text || "").join("\n") || "Summary generation failed. Please try again.";
      setAiSummary(text);

      setAiSummary("Could not generate summary. You can still review the raw responses below.\n\n---\n\n" + allResponses);

    setSummaryLoading(false);

            <div>
              <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: 2, color: accentColor, textTransform: "uppercase" }}>{template.subtitle}</div>
              <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 28, fontWeight: 700, color: brandColor }}>Discovery Summary</h1>
            </div>
            <button onClick={() => { setShowSummary(false); }} style={{ background: `${brandColor}10`, border: "none", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, color: brandColor, cursor: "pointer" }}>← Back to responses</button>
          </div>

          {summaryLoading ? (
            <div style={{ textAlign: "center", padding: "80px 0", animation: "float-in 0.5s ease-out" }}>
              <div style={{ width: 48, height: 48, border: `3px solid ${brandColor}20`, borderTopColor: brandColor, borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 24px" }} />
              <p style={{ fontSize: 16, color: "#5a6a7a" }}>Generating your structured summary...</p>
            </div>
          ) : (
            <div style={{ animation: "float-in 0.6s ease-out" }}>
              <div style={{ background: "white", borderRadius: 16, padding: "36px 32px", boxShadow: "0 2px 16px rgba(0,0,0,0.06)", border: "1px solid #e8ecf0", marginBottom: 24 }}>
                <div style={{ fontSize: 15, lineHeight: 1.8, color: "#2a2a3a", whiteSpace: "pre-wrap" }}>{aiSummary}</div>
              </div>

              <div style={{ background: "white", borderRadius: 16, padding: "28px 32px", boxShadow: "0 2px 16px rgba(0,0,0,0.06)", border: "1px solid #e8ecf0" }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: brandColor, marginBottom: 16, fontFamily: "'Fraunces', serif" }}>Raw Responses</h3>
                {mode === "guided" ? template.phases.map((phase, pi) => (
                  <div key={pi} style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: accentColor, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{phase.icon} {phase.name}</div>
                    {phase.questions.map((q, qi) => {
                      const resp = responses[`${pi}-${qi}`];
                      return (
                        <div key={qi} style={{ marginBottom: 12, paddingLeft: 16, borderLeft: `2px solid ${resp ? accentColor + "40" : "#e0e0e0"}` }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#4a5568", marginBottom: 2 }}>{q}</div>
                          <div style={{ fontSize: 13, color: resp ? "#2a2a3a" : "#999", fontStyle: resp ? "normal" : "italic" }}>{resp || "No response"}</div>
                        </div>
                      );
                    })}
                  </div>
                )) : (
                  <div style={{ fontSize: 14, color: "#2a2a3a", whiteSpace: "pre-wrap", lineHeight: 1.7 }}>{freeformText}</div>
                )}
              </div>

              <div style={{ display: "flex", gap: 12, marginTop: 24, justifyContent: "center" }}>
                <button onClick={generateSummary} style={{ background: brandColor, color: "white", border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Regenerate Summary</button>
                <button onClick={() => { navigator.clipboard.writeText(aiSummary); }} style={{ background: `${brandColor}10`, color: brandColor, border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Copy Summary</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ─── FREE-FORM MODE ───
  if (mode === "freeform") {
    const fullText = freeformText + (speech.transcript ? (freeformText ? " " : "") + speech.transcript : "");
    const displayText = fullText + (speech.interimTranscript ? " " + speech.interimTranscript : "");

    return (
      <div style={{ ...styles.app, background: `linear-gradient(135deg, ${brandColor}06 0%, #f8f9fb 100%)` }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:wght@600;700;800&display=swap');
          * { box-sizing: border-box; margin: 0; padding: 0; }
          @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 0; } }
          @keyframes float-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        `}</style>
        <div style={styles.container}>
          <button onClick={() => setMode(null)} style={{ background: "none", border: "none", color: accentColor, fontSize: 14, fontWeight: 600, cursor: "pointer", marginBottom: 24, fontFamily: "'DM Sans'" }}>← Change mode</button>

          <div style={{ textAlign: "center", marginBottom: 36, animation: "float-in 0.5s ease-out" }}>
            <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: 2, color: accentColor, textTransform: "uppercase", marginBottom: 6 }}>{template.subtitle} · Free-Form</div>
            <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 28, fontWeight: 700, color: brandColor, marginBottom: 8 }}>Just Talk</h1>
            <p style={{ fontSize: 15, color: "#5a6a7a", maxWidth: 500, margin: "0 auto" }}>{template.description}</p>
          </div>

          <div style={{ background: "white", borderRadius: 16, padding: "28px 28px 20px", boxShadow: "0 2px 16px rgba(0,0,0,0.06)", border: "1px solid #e8ecf0", marginBottom: 24, minHeight: 200 }}>
            <div style={{ fontSize: 14, lineHeight: 1.8, color: displayText ? "#2a2a3a" : "#aaa", whiteSpace: "pre-wrap", fontStyle: displayText ? "normal" : "italic" }}>
              {displayText || "Hit the record button and start talking. Tell us the whole story — we'll organize it for you."}
            </div>
          </div>

          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 16, marginBottom: 24 }}>
            <button
              onClick={() => {
                if (speech.isListening) {
                  speech.stopListening();
                  setFreeformText(prev => prev + (prev ? " " : "") + speech.transcript);
                  speech.resetTranscript();
                } else {
                  speech.startListening();
                }
              }}
              style={{
                width: 72, height: 72, borderRadius: "50%",
                background: speech.isListening ? "#ef4444" : brandColor,
                border: "none", cursor: "pointer", position: "relative",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.3s ease", boxShadow: speech.isListening ? "0 0 0 4px #ef444430" : `0 4px 20px ${brandColor}30`,
              }}
            >
              {speech.isListening && <PulseRing color="#ef4444" />}
              <span style={{ fontSize: 28 }}>{speech.isListening ? "⏹" : "🎙️"}</span>
            </button>
            {speech.isListening && <span style={{ fontSize: 14, fontWeight: 600, color: "#ef4444", fontVariantNumeric: "tabular-nums" }}>{formatTime(recordingSeconds)}</span>}
          </div>

          {(fullText || freeformText) && (
            <div style={{ display: "flex", justifyContent: "center", gap: 12 }}>
              <button onClick={generateSummary} style={{ background: brandColor, color: "white", border: "none", borderRadius: 10, padding: "12px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Generate Summary</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ─── GUIDED MODE ───
  const phase = template.phases[currentPhase];
  const question = phase.questions[currentQuestion];
  const responseKey = `${currentPhase}-${currentQuestion}`;
  const existingResponse = responses[responseKey];
  const currentText = speech.transcript || existingResponse || "";
  const displayCurrent = currentText + (speech.interimTranscript ? " " + speech.interimTranscript : "");

  // Progress
  let questionsBefore = 0;
  for (let i = 0; i < currentPhase; i++) questionsBefore += template.phases[i].questions.length;
  const globalIndex = questionsBefore + currentQuestion + 1;
  const progressPct = (globalIndex / totalQuestions) * 100;

  return (
    <div style={{ ...styles.app, background: `linear-gradient(135deg, ${brandColor}06 0%, #f8f9fb 100%)` }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:wght@600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes float-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      `}</style>
      <div style={styles.container}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <button onClick={() => setMode(null)} style={{ background: "none", border: "none", color: accentColor, fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans'" }}>← Change mode</button>
          <span style={{ fontSize: 13, color: "#8a9aaa", fontWeight: 500 }}>{answeredCount} of {totalQuestions} answered</span>
        </div>

        {/* Progress bar */}
        <div style={{ height: 4, background: "#e8ecf0", borderRadius: 4, marginBottom: 32, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${progressPct}%`, background: `linear-gradient(90deg, ${brandColor}, ${accentColor})`, borderRadius: 4, transition: "width 0.5s ease" }} />
        </div>

        {/* Phase nav */}
        <div style={{ display: "flex", gap: 6, marginBottom: 32, flexWrap: "wrap" }}>
          {template.phases.map((p, i) => {
            const isActive = i === currentPhase;
            const phaseAnswered = p.questions.filter((_, qi) => responses[`${i}-${qi}`]).length;
            const isComplete = phaseAnswered === p.questions.length;
            return (
              <button key={i} onClick={() => { saveResponse(); setCurrentPhase(i); setCurrentQuestion(0); }}
                style={{
                  background: isActive ? brandColor : (isComplete ? `${brandColor}12` : "white"),
                  color: isActive ? "white" : (isComplete ? brandColor : "#6a7a8a"),
                  border: `1px solid ${isActive ? brandColor : (isComplete ? `${brandColor}30` : "#e0e4e8")}`,
                  borderRadius: 20, padding: "6px 14px", fontSize: 12, fontWeight: 600,
                  cursor: "pointer", transition: "all 0.2s ease", whiteSpace: "nowrap",
                }}>
                {p.icon} {p.name} {isComplete && !isActive ? "✓" : `${phaseAnswered}/${p.questions.length}`}
              </button>
            );
          })}
        </div>

        {/* Question card */}
        <div style={{ background: "white", borderRadius: 20, padding: "40px 36px", boxShadow: `0 4px 24px ${brandColor}08`, border: `1px solid ${brandColor}10`, marginBottom: 24, animation: "float-in 0.4s ease-out" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
            <span style={{ fontSize: 20 }}>{phase.icon}</span>
            <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: accentColor, textTransform: "uppercase" }}>{phase.name}</span>
            <span style={{ fontSize: 12, color: "#aab", marginLeft: "auto" }}>Question {currentQuestion + 1} of {phase.questions.length}</span>
          </div>

          <h2 style={{ fontFamily: "'Fraunces', serif", fontSize: "clamp(20px, 3vw, 26px)", fontWeight: 700, color: brandColor, lineHeight: 1.35, marginBottom: 28 }}>
            {question}
          </h2>

          {/* Response area */}
          <div style={{ background: displayCurrent ? `${brandColor}04` : "#f8f9fb", border: `1px solid ${speech.isListening ? accentColor + "60" : "#e4e8ec"}`, borderRadius: 12, padding: "20px 24px", minHeight: 100, marginBottom: 24, transition: "all 0.3s ease" }}>
            <div style={{ fontSize: 15, lineHeight: 1.7, color: displayCurrent ? "#2a2a3a" : "#aaa", fontStyle: displayCurrent ? "normal" : "italic" }}>
              {displayCurrent || "Tap the microphone to record your answer, or type below..."}
            </div>
          </div>

          {/* Text input fallback */}
          <textarea
            value={speech.transcript || responses[responseKey] || ""}
            onChange={(e) => { speech.setTranscript(e.target.value); }}
            placeholder="Or type your answer here..."
            style={{
              width: "100%", minHeight: 48, border: "1px solid #e4e8ec", borderRadius: 10,
              padding: "12px 16px", fontSize: 14, fontFamily: "'DM Sans'", color: "#2a2a3a",
              resize: "vertical", outline: "none", background: "#fafbfc",
            }}
            onFocus={e => e.target.style.borderColor = accentColor}
            onBlur={e => e.target.style.borderColor = "#e4e8ec"}
          />
        </div>

        {/* Controls */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button onClick={prevQuestion} disabled={currentPhase === 0 && currentQuestion === 0}
            style={{ background: "white", border: "1px solid #dde2e6", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, color: "#5a6a7a", cursor: "pointer", opacity: (currentPhase === 0 && currentQuestion === 0) ? 0.4 : 1 }}>
            ← Previous
          </button>

          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button
              onClick={() => {
                if (speech.isListening) {
                  speech.stopListening();
                } else {
                  speech.resetTranscript();
                  speech.startListening();
                }
              }}
              style={{
                width: 64, height: 64, borderRadius: "50%",
                background: speech.isListening ? "#ef4444" : brandColor,
                border: "none", cursor: "pointer", position: "relative",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.3s ease", boxShadow: speech.isListening ? "0 0 0 4px #ef444430" : `0 4px 20px ${brandColor}30`,
              }}
            >
              {speech.isListening && <PulseRing color="#ef4444" />}
              <span style={{ fontSize: 24 }}>{speech.isListening ? "⏹" : "🎙️"}</span>
            </button>
            {speech.isListening && <span style={{ fontSize: 13, fontWeight: 600, color: "#ef4444", fontVariantNumeric: "tabular-nums" }}>{formatTime(recordingSeconds)}</span>}
          </div>

          {isLastQuestion ? (
            <button onClick={() => { saveResponse(); generateSummary(); }}
              style={{ background: brandColor, color: "white", border: "none", borderRadius: 10, padding: "10px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: `0 4px 16px ${brandColor}30` }}>
              View Summary →
            </button>
          ) : (
            <button onClick={nextQuestion}
              style={{ background: brandColor, color: "white", border: "none", borderRadius: 10, padding: "10px 24px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
              Next →
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(VoiceDiscoveryApp));
  </script>
</body>
</html>
